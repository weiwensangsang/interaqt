# CloudFlare Pages 配置
name = "interaqt-dashboard"
compatibility_date = "2024-12-17"
pages_build_output_dir = "dist"

# D1 数据库绑定（生产环境）
[[d1_databases]]
binding = "DB"
database_name = "interaqt-counter-db"
database_id = "3ff97da7-489d-43a9-b639-90e9a1c27503"  # 创建数据库后会得到这个 ID

# 本地开发配置
[env.preview]
[[env.preview.d1_databases]]
binding = "DB"
database_name = "interaqt-counter-db"
database_id = "local"
